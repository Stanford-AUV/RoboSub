segment_0:
  waypoints:
    - position: {x: 1.0, y: 0.0, z: 0.0}
      orientation: {roll: 0.0, pitch: 0.0, yaw: 90.0}
    - position: {x: 1.0, y: 1.0, z: 0.0}
      orientation: {roll: 0.0, pitch: 0.0, yaw: -90.0}
    - position: {x: 0.0, y: 1.0, z: 0.0}
      orientation: {roll: 0.0, pitch: 0.0, yaw: 0.0}
    - position: {x: 0.0, y: 0.0, z: 0.0}
      orientation: {roll: 0.0, pitch: 0.0, yaw: 180.0}
  concurrent_action: None
  with_timeout_s: 10
  exit_on_reach: True

segment_1:
  waypoints:
    - position: {x: 0.0, y: 0.0, z: 0.0}
      orientation: {roll: 0.0, pitch: 0.0, yaw: 180.0}
  concurrent_action: "shoot"
  with_timeout_s: 10
  exit_on_reach: False